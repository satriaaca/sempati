<!DOCTYPE html>
<html lang="id" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistem Intelijen{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header class="mobile-header d-lg-none">

    <button
        class="btn btn-success"
        id="sidebarToggle"
    >
        <i class="bi bi-list"></i>
    </button>

    <span class="fw-bold">
        SEMPATI V.2
    </span>
</div>

</header>

<div id="sidebarOverlay"></div>

<div class="app-wrapper">

    <!-- Sidebar -->
    <aside     class="sidebar shadow-sm"
    id="sidebar">

        <div class="sidebar-header">
            <h5 class="fw-bold mb-0">SEMPATI V.2</h5>
            <small>Kejari Tabanan</small>
        </div>

        <nav class="mt-4">

            <a href="{{ url_for('dashboard') }}" class="menu-item">
                <i class="bi bi-grid-fill"></i>
                Dashboard
            </a>

            <a href="{{ url_for('lapinhar_page') }}" class="menu-item">
                <i class="bi bi-file-earmark-text"></i>
                LAPINHAR
            </a>

            <a href="{{ url_for('lapinsus_page') }}"  class="menu-item">
                <i class="bi bi-exclamation-triangle"></i>
                LAPINSUS
            </a>
            <!--
            <a href="#" class="menu-item">
                <i class="bi bi-graph-up"></i>
                Statistik
            </a>

            <a href="#" class="menu-item">
                <i class="bi bi-newspaper"></i>
                Scraper Berita
            </a>

            <a href="#" class="menu-item">
                <i class="bi bi-gear"></i>
                Pengaturan
            </a>
        -->

        </nav>

        <div class="mt-auto p-3">
            <button id="themeToggle" class="btn btn-outline-light w-100">
                🌙 Dark Mode
            </button>
        </div>

    </aside>
</div>

    <!-- Main Content -->
    <main class="content-area">

        <div class="container-fluid py-4">

            {% block content %}
            {% endblock %}

        </div>

    </main>

</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

{% block extra_js %}
{% endblock %}

</body>
</html>
